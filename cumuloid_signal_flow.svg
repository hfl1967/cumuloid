<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.box-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
.box-gray { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.th { font-family: sans-serif; font-size: 13px; font-weight: 500; fill: #2C2C2A; }
.ts { font-family: sans-serif; font-size: 11px; font-weight: 400; fill: #5F5E5A; }
.th-teal { font-family: sans-serif; font-size: 13px; font-weight: 500; fill: #085041; }
.ts-teal { font-family: sans-serif; font-size: 11px; font-weight: 400; fill: #0F6E56; }
.th-purple { font-family: sans-serif; font-size: 13px; font-weight: 500; fill: #3C3489; }
.ts-purple { font-family: sans-serif; font-size: 11px; font-weight: 400; fill: #534AB7; }
.th-amber { font-family: sans-serif; font-size: 13px; font-weight: 500; fill: #633806; }
.ts-amber { font-family: sans-serif; font-size: 11px; font-weight: 400; fill: #854F0B; }
.leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
.arr { stroke: #888780; stroke-width: 1.2; fill: none; }
.bypass { stroke: #888780; stroke-width: 1; stroke-dasharray: 5 4; fill: none; }
</style>
</defs>

<!-- Title -->
<rect x="40" y="16" width="600" height="30" rx="6" class="box-gray"/>
<text x="340" y="35" text-anchor="middle" class="th">cumuloid — signal flow (Mutable Instruments Clouds engine on Daisy Petal)</text>

<!-- Audio Input -->
<rect x="240" y="62" width="200" height="38" rx="8" class="box-gray"/>
<text x="340" y="85" text-anchor="middle" dominant-baseline="central" class="th">Audio input (stereo, 32kHz)</text>

<line x1="340" y1="100" x2="340" y2="128" class="arr" marker-end="url(#arrow)"/>

<!-- S3 Bypass -->
<rect x="240" y="128" width="200" height="44" rx="8" class="box-gray"/>
<text x="340" y="144" text-anchor="middle" dominant-baseline="central" class="th">S3 — bypass switch</text>
<text x="340" y="160" text-anchor="middle" dominant-baseline="central" class="ts">routes signal path</text>

<!-- Bypass dashed path -->
<path d="M240 150 L90 150 L90 690 L200 690" class="bypass" marker-end="url(#arrow)"/>
<text x="46" y="390" text-anchor="middle" class="ts">bypass</text>
<text x="46" y="403" text-anchor="middle" class="ts">path</text>
<text x="46" y="416" text-anchor="middle" class="ts">1:1</text>

<line x1="340" y1="172" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

<!-- Dry path split -->
<text x="340" y="196" text-anchor="middle" class="ts">dry path splits here</text>

<!-- Clouds DSP -->
<rect x="190" y="206" width="300" height="56" rx="8" class="box-teal"/>
<text x="340" y="224" text-anchor="middle" dominant-baseline="central" class="th-teal">Clouds DSP engine (params-&gt;dry_wet = 1.0)</text>
<text x="340" y="244" text-anchor="middle" dominant-baseline="central" class="ts-teal">Granular · Stretch · Looping · Spectral</text>

<!-- Controls for Clouds -->
<line x1="490" y1="224" x2="514" y2="224" class="leader"/>
<text x="518" y="220" class="ts">K1 position · K2 size</text>
<text x="518" y="234" class="ts">K3 texture · K4 density</text>
<line x1="490" y1="244" x2="514" y2="244" class="leader"/>
<text x="518" y="248" class="ts">K5 pitch · encoder mode</text>

<line x1="190" y1="224" x2="166" y2="224" class="leader"/>
<text x="162" y="220" text-anchor="end" class="ts">S1 freeze</text>
<text x="162" y="234" text-anchor="end" class="ts">S6 randomize</text>
<line x1="190" y1="244" x2="166" y2="244" class="leader"/>
<text x="162" y="248" text-anchor="end" class="ts">S2 quality</text>

<!-- Mode label -->
<text x="340" y="198" text-anchor="middle" class="ts">S7 pitch snap · feedback: shift+K2 · always-on reverb: shift+K1</text>

<line x1="340" y1="262" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>

<!-- Per-mode gain -->
<rect x="210" y="290" width="260" height="44" rx="8" class="box-teal"/>
<text x="340" y="306" text-anchor="middle" dominant-baseline="central" class="th-teal">Per-mode gain compensation</text>
<text x="340" y="322" text-anchor="middle" dominant-baseline="central" class="ts-teal">Amber×1.1 · Cyan×1.2 · Green×2.0 · Purple×1.2</text>

<line x1="340" y1="334" x2="340" y2="362" class="arr" marker-end="url(#arrow)"/>

<!-- HP Filter -->
<rect x="220" y="362" width="240" height="44" rx="8" class="box-purple"/>
<text x="340" y="378" text-anchor="middle" dominant-baseline="central" class="th-purple">High pass filter (wet only)</text>
<text x="340" y="394" text-anchor="middle" dominant-baseline="central" class="ts-purple">40–400 Hz · shift+K4 cutoff</text>

<line x1="340" y1="406" x2="340" y2="434" class="arr" marker-end="url(#arrow)"/>

<!-- LP Filter -->
<rect x="220" y="434" width="240" height="44" rx="8" class="box-purple"/>
<text x="340" y="450" text-anchor="middle" dominant-baseline="central" class="th-purple">Low pass filter (wet only)</text>
<text x="340" y="466" text-anchor="middle" dominant-baseline="central" class="ts-purple">1k–12kHz · shift+K3 cutoff</text>

<line x1="340" y1="478" x2="340" y2="506" class="arr" marker-end="url(#arrow)"/>

<!-- Soft clip -->
<rect x="220" y="506" width="240" height="44" rx="8" class="box-purple"/>
<text x="340" y="522" text-anchor="middle" dominant-baseline="central" class="th-purple">Soft clip (wet only)</text>
<text x="340" y="538" text-anchor="middle" dominant-baseline="central" class="ts-purple">tanh limiter · unity ceiling</text>

<line x1="340" y1="550" x2="340" y2="578" class="arr" marker-end="url(#arrow)"/>

<!-- Output mix -->
<rect x="190" y="578" width="300" height="56" rx="8" class="box-amber"/>
<text x="340" y="596" text-anchor="middle" dominant-baseline="central" class="th-amber">Output blend</text>
<text x="340" y="614" text-anchor="middle" dominant-baseline="central" class="ts-amber">dry × (1−K6) + wet × K6 · level × shift+K6</text>

<line x1="490" y1="596" x2="514" y2="596" class="leader"/>
<text x="518" y="592" class="ts">K6 blend</text>
<text x="518" y="606" class="ts">shift+K6 output level</text>
<line x1="190" y1="606" x2="166" y2="606" class="leader"/>
<text x="162" y="602" text-anchor="end" class="ts">shift+K5 dry level</text>

<line x1="340" y1="634" x2="340" y2="662" class="arr" marker-end="url(#arrow)"/>

<!-- Audio Output -->
<rect x="240" y="662" width="200" height="38" rx="8" class="box-gray"/>
<text x="340" y="684" text-anchor="middle" dominant-baseline="central" class="th">Audio output (stereo)</text>

<!-- Bypass path arrives -->
<path d="M200 690 L238 690" class="bypass" marker-end="url(#arrow)"/>

<!-- Mode colors legend -->
<rect x="40" y="724" width="600" height="76" rx="8" class="box-gray"/>
<text x="340" y="742" text-anchor="middle" class="th">Ring LED mode colors</text>
<rect x="60" y="752" width="120" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="120" y="768" text-anchor="middle" class="th-amber">Amber</text>
<text x="120" y="782" text-anchor="middle" class="ts-amber">Granular</text>
<rect x="196" y="752" width="120" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="256" y="768" text-anchor="middle" class="th-teal">Cyan</text>
<text x="256" y="782" text-anchor="middle" class="ts-teal">Stretch*</text>
<rect x="332" y="752" width="120" height="36" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="392" y="768" text-anchor="middle" style="font-family:sans-serif;font-size:13px;font-weight:500;fill:#27500A;">Green</text>
<text x="392" y="782" text-anchor="middle" style="font-family:sans-serif;font-size:11px;fill:#3B6D11;">Looping</text>
<rect x="468" y="752" width="132" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="534" y="768" text-anchor="middle" class="th-purple">Purple</text>
<text x="534" y="782" text-anchor="middle" class="ts-purple">Spectral</text>
<text x="340" y="800" text-anchor="middle" class="ts">* Cyan (Stretch) wet signal issue under investigation — see GitHub Issues</text>
</svg>
